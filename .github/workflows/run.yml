name: isyatirim-bist-screener

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1-5'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run BIST analysis
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python isyatirim_analiz.py --universe bist --output bist_genel_analiz_raporu.xlsx
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            python isyatirim_analiz.py --universe bist --telegram --output bist_genel_analiz_raporu.xlsx
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bist-genel-analiz-raporu
          path: |
            bist_genel_analiz_raporu.xlsx
            bist_genel_analiz_raporu.json
