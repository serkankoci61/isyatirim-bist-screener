name: isyatirim-bist-screener

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1-5'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run BIST analysis
        run: |
          python isyatirim_analiz.py --universe bist --output bist_genel_analiz_raporu.xlsx

      - name: Send Telegram report
        if: ${{ secrets.TELEGRAM_BOT_TOKEN != '' && secrets.TELEGRAM_CHAT_ID != '' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
            -F chat_id="${TELEGRAM_CHAT_ID}" \
            -F caption="BIST genel analiz raporu hazır." \
            -F document=@bist_genel_analiz_raporu.xlsx

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bist-genel-analiz-raporu
          path: |
            bist_genel_analiz_raporu.xlsx
            bist_genel_analiz_raporu.json
